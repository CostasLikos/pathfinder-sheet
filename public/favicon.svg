<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f1c20"/>
      <stop offset="100%" stop-color="#060c0e"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>

  <!-- Outer ring glow -->
  <circle cx="256" cy="256" r="232" fill="none" stroke="#c8236a" stroke-width="2" opacity="0.3"/>
  <!-- Outer circle -->
  <circle cx="256" cy="256" r="226" fill="none" stroke="#c8236a" stroke-width="6" filter="url(#glow)"/>
  <!-- Inner circle -->
  <circle cx="256" cy="256" r="198" fill="none" stroke="#c8236a" stroke-width="3" opacity="0.6"/>

  <!-- Hebrew letters at cardinal points (between the two circles) -->
  <!-- מ  top -->
  <text x="256" y="44" text-anchor="middle" dominant-baseline="middle"
        font-family="Georgia, serif" font-size="34" fill="#f0e8ff" filter="url(#glow)" opacity="0.9">מ</text>
  <!-- פ  right -->
  <text x="470" y="260" text-anchor="middle" dominant-baseline="middle"
        font-family="Georgia, serif" font-size="34" fill="#f0e8ff" filter="url(#glow)" opacity="0.9">פ</text>
  <!-- י  bottom -->
  <text x="256" y="472" text-anchor="middle" dominant-baseline="middle"
        font-family="Georgia, serif" font-size="34" fill="#f0e8ff" filter="url(#glow)" opacity="0.9">י</text>
  <!-- ז  left -->
  <text x="42" y="260" text-anchor="middle" dominant-baseline="middle"
        font-family="Georgia, serif" font-size="34" fill="#f0e8ff" filter="url(#glow)" opacity="0.9">ז</text>

  <!-- ── Sigil (centered at 256,256) ── -->
  <g transform="translate(256,256)" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- Triangle pointing left, magenta fill -->
    <polygon points="-108,0 28,-90 28,90"
             stroke="#c8236a" stroke-width="6"
             fill="rgba(200,35,106,0.07)"
             filter="url(#glow)"/>

    <!-- Vertical staff -->
    <line x1="48" y1="-130" x2="48" y2="130"
          stroke="#ffffff" stroke-width="7" filter="url(#softglow)"/>

    <!-- Top cross-bar -->
    <line x1="6" y1="-72" x2="96" y2="-72"
          stroke="#ffffff" stroke-width="6" filter="url(#softglow)"/>

    <!-- Top axe head (right of crossbar) -->
    <path d="M80,-100 L108,-118 L114,-72 L96,-72 Z"
          stroke="#c8236a" stroke-width="4" fill="rgba(200,35,106,0.2)" filter="url(#glow)"/>

    <!-- Ladder rungs (right of staff, middle section) -->
    <line x1="48" y1="-18" x2="100" y2="-18" stroke="#ffffff" stroke-width="5"/>
    <line x1="48" y1="14"  x2="100" y2="14"  stroke="#ffffff" stroke-width="5"/>
    <line x1="48" y1="46"  x2="100" y2="46"  stroke="#ffffff" stroke-width="5"/>
    <line x1="48" y1="78"  x2="100" y2="78"  stroke="#ffffff" stroke-width="5"/>
    <!-- Right rail of ladder -->
    <line x1="100" y1="-18" x2="100" y2="78" stroke="#ffffff" stroke-width="5"/>

    <!-- Mini cross on ladder (magenta accent) -->
    <line x1="68" y1="30" x2="118" y2="30"
          stroke="#c8236a" stroke-width="5" filter="url(#glow)"/>
    <line x1="93" y1="5"  x2="93"  y2="56"
          stroke="#c8236a" stroke-width="5" filter="url(#glow)"/>

    <!-- Bottom axe head (below ladder) -->
    <path d="M30,110 L66,90 L72,130 Z"
          stroke="#c8236a" stroke-width="3" fill="rgba(200,35,106,0.2)" filter="url(#glow)"/>

    <!-- Z-mark / flourish bottom-left (inside triangle area) -->
    <path d="M-72,38 L-44,38 L-72,68 L-44,68"
          stroke="#ffffff" stroke-width="4" opacity="0.7"/>

    <!-- Serif curl at staff base -->
    <path d="M48,130 Q30,150 10,140 Q-10,128 0,110"
          stroke="#ffffff" stroke-width="3" opacity="0.5"/>

  </g>

  <!-- Center dot -->
  <circle cx="256" cy="256" r="6" fill="#c8236a" filter="url(#softglow)"/>
</svg>
